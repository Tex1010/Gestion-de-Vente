{% extends "base.html" %}{% load static %}
{% block title %}Mot de passe oublié{% endblock %}
{% block content %}
<section class="py-5"><div class="container"><div class="row justify-content-center"><div class="col-md-6 col-lg-5">
<div class="content-panel p-5">
    <h4 class="mb-4"><i class="bi bi-unlock me-2"></i>Mot de passe oublié</h4>
    <p class="text-muted mb-4">Saisissez votre adresse email pour recevoir un lien de réinitialisation.</p>
    <form method="post">{% csrf_token %}
        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control form-control-lg" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">Envoyer le lien</button>
    </form>
    <div class="text-center mt-3"><a href="{% url 'accounts:login' %}" class="small">Retour à la connexion</a></div>
</div></div></div></div></section>
{% endblock %}
