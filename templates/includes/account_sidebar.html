<div class="text-center mb-4">
    <div style="width:80px;height:80px;border-radius:50%;overflow:hidden;margin:0 auto;background:#f1f5f9;display:flex;align-items:center;justify-content:center;">
        {% if user.profile.avatar %}
        <img src="{{ user.profile.avatar.url }}" alt="{{ user.username }}" style="width:100%;height:100%;object-fit:cover;">
        {% else %}
        <i class="bi bi-person-circle" style="font-size:2.5rem;color:#adb5bd;"></i>
        {% endif %}
    </div>
    <h5 class="mt-3 mb-0">{{ user.username }}</h5>
    <small class="text-muted">{{ user.email }}</small>
</div>
<hr>
<nav class="d-flex flex-column gap-2">
    {% with url_name=request.resolver_match.url_name %}
    <a href="{% url 'accounts:profile' %}" class="btn btn-outline-primary btn-sm w-100 {% if url_name == 'profile' %}active{% endif %}">
        <i class="bi bi-person me-2"></i>Mon profil
    </a>
    <a href="{% url 'accounts:order_history' %}" class="btn btn-outline-primary btn-sm w-100 {% if url_name == 'order_history' %}active{% endif %}">
        <i class="bi bi-receipt me-2"></i>Mes commandes
    </a>
    <a href="{% url 'accounts:wishlist' %}" class="btn btn-outline-primary btn-sm w-100 {% if url_name == 'wishlist' %}active{% endif %}">
        <i class="bi bi-heart me-2"></i>Mes favoris
    </a>
    <hr>
    <a href="{% url 'accounts:password_change' %}" class="btn btn-outline-secondary btn-sm w-100 {% if 'password' in url_name %}active{% endif %}">
        <i class="bi bi-key me-2"></i>Changer mot de passe
    </a>
    <a href="{% url 'accounts:logout' %}" class="btn btn-outline-danger btn-sm w-100">
        <i class="bi bi-box-arrow-right me-2"></i>Déconnexion
    </a>
    {% endwith %}
</nav>
